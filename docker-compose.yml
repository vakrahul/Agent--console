version: "3.9"

services:
  agent-server:
    build:
      context: ./agent-server
    ports:
      - "4747:4747"

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    depends_on:
      - agent-server
